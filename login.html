<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strava Dashboard — Connexion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0f0f0f; color: #e5e5e5; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; }
  .card { background: #1a1a1a; border: 1px solid #2e2e2e; border-radius: 16px;
          padding: 40px; width: 100%; max-width: 360px; }
  .logo { font-size: 32px; margin-bottom: 8px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #777; margin-bottom: 32px; }
  label { font-size: 12px; color: #888; text-transform: uppercase;
          letter-spacing: 0.05em; display: block; margin-bottom: 8px; }
  input[type=password] { width: 100%; padding: 12px 14px; background: #111;
          border: 1px solid #333; border-radius: 8px; color: #fff;
          font-size: 15px; margin-bottom: 16px; outline: none; }
  input[type=password]:focus { border-color: #FC4C02; }
  button { width: 100%; padding: 12px; background: #FC4C02; color: white;
           border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
           cursor: pointer; }
  button:hover { background: #e04402; }
  .error { background: #2a0a0a; border: 1px solid #7a2020; border-radius: 8px;
           padding: 10px 14px; font-size: 13px; color: #f87171; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🚴</div>
  <h1>Fitness Dashboard</h1>
  <div class="sub">Accès personnel — Olivier</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Mot de passe</label>
    <input type="password" name="password" placeholder="••••••••" autofocus>
    <button type="submit">Accéder au dashboard</button>
  </form>
</div>
</body>
</html>
